name: Eleventy Build

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci
      - name: Build site
        run: npx @11ty/eleventy
      - name: Archive site
        uses: actions/upload-artifact@v6
        with:
          name: site
          path: _site

name: Eleventy Build

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci
      - name: Build site
        run: npx @11ty/eleventy
      - name: Archive site
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: _site

  validate-html:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci
      - name: Download built site
        uses: actions/download-artifact@v4
        with:
          name: site
          path: _site
      - name: Validate HTML
        run: npx html-validate '_site/**/*.html'

  check-links:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Download built site
        uses: actions/download-artifact@v4
        with:
          name: site
          path: _site
      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config lychee.toml --base _site _site
          fail: true

  check-accessibility:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci
      - name: Download built site
        uses: actions/download-artifact@v4
        with:
          name: site
          path: _site
      - name: Start local server
        run: npx http-server _site -p 8080 --silent &
      - name: Wait for server
        run: sleep 3
      - name: Generate pa11y-ci config from sitemap
        run: |
          node -e "
          const fs = require('fs');
          const xml = fs.readFileSync('_site/sitemap.xml', 'utf8');
          const base = fs.readFileSync('.pa11yci.json', 'utf8');
          const defaults = JSON.parse(base);
          const urls = [...xml.matchAll(/<loc>(.*?)<\/loc>/g)]
            .map(m => m[1].replace('https://benjaminchait.net', 'http://localhost:8080'));
          const config = { ...defaults, urls };
          fs.writeFileSync('.pa11yci-run.json', JSON.stringify(config, null, 2));
          console.log('Checking ' + urls.length + ' pages');
          "
      - name: Check accessibility
        run: npx pa11y-ci --config .pa11yci-run.json
